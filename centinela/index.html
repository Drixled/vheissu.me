<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMK Centinela — Vendors</title>
  <meta name="description" content="Regional vendors for GMK Centinela, an extension kit from GMK Mictlán." />
  <meta name="theme-color" content="#060606" />
  <meta property="og:title" content="GMK Centinela — Vendors" />
  <meta property="og:description" content="Regional vendors for GMK Centinela, an extension kit from GMK Mictlán." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@500;600&display=swap"
  />

  <style>
    :root {
      --fg-rgb:       237 230 214;
      --accent-rgb:   196 122 63;

      --bg:           #060606;
      --bg-card-top:  #111111;
      --bg-card-bot:  #050505;
      --fg:           rgb(var(--fg-rgb));
      --muted:        #8f8f8a;                           /* neutral muted for dark mode */
      --line:         rgb(var(--fg-rgb) / 0.07);
      --line-strong:  rgb(var(--fg-rgb) / 0.14);
      --accent:       rgb(var(--accent-rgb));

      --font-sans: "Space Grotesk", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;

      --ease:     cubic-bezier(0.2, 0.7, 0.2, 1);
      --ease-out: cubic-bezier(0.19, 1, 0.22, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #060606;
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-kerning: normal;
      font-feature-settings: "kern", "liga", "calt";
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 5rem 1.5rem;
      position: relative;
      overflow-x: hidden;

      /* Subtle ambient depth — true dark base, particles carry the color */
      background:
        radial-gradient(ellipse 90% 45% at 50% 110%, rgb(var(--accent-rgb) / 0.07), transparent 60%),
        #060606;
    }

    /* Ember particle canvas — GPU-composited background layer */
    #embers {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Cursor-tracked ambient glow — follows mouse across viewport */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 800ms var(--ease);
      background: radial-gradient(
        circle 520px at var(--cx, 50%) var(--cy, 50%),
        rgb(var(--accent-rgb) / 0.09),
        transparent 60%
      );
    }

    body.has-cursor .ambient { opacity: 1; }

    /* Film grain — material quality */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.93  0 0 0 0 0.9  0 0 0 0 0.84  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      opacity: 0.5;
      mix-blend-mode: overlay;
      z-index: 1;
    }

    /* Edge vignette — cinematic */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }

    main {
      width: 100%;
      max-width: 64rem;
      position: relative;
      z-index: 2;
    }

    /* ——— Choreographed entrance ——— */
    @keyframes logoAppear {
      0% {
        opacity: 0;
        filter: blur(28px) brightness(0.4);
        transform: scale(0.94) translateY(12px);
      }
      100% {
        opacity: 1;
        filter: blur(0) brightness(1);
        transform: scale(1) translateY(0);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: perspective(800px) rotateX(12deg) translateY(24px);
      }
      to {
        opacity: 1;
        transform: perspective(800px) rotateX(0) translateY(0);
      }
    }

    /* ——— Header ——— */
    header {
      text-align: center;
      margin-bottom: 5.5rem;
    }

    h1 {
      margin: 0;
      line-height: 0;
    }

    .logo {
      display: inline-block;
      width: 100%;
      max-width: clamp(11rem, 32vw, 19rem);
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      animation: logoAppear 1200ms var(--ease-out) 150ms both;
      will-change: filter, opacity, transform;
    }

    /* ——— Grid of sentinels ——— */
    .grid {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.875rem;
    }

    .grid > li {
      opacity: 0;
      animation: cardIn 900ms var(--ease-out) both;
      animation-delay: calc(800ms + var(--i, 0) * 80ms);
    }

    /* Each card is its own 3D scene — tilt uses --rx / --ry set by JS */
    .card {
      position: relative;
      display: block;
      padding: 1.5rem;
      min-height: 13rem;
      background: linear-gradient(155deg, var(--bg-card-top) 0%, var(--bg-card-bot) 100%);
      border: 1px solid var(--line);
      color: var(--fg);
      text-decoration: none;
      overflow: hidden;
      isolation: isolate;
      transform: perspective(900px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transform-style: preserve-3d;
      transform-origin: center center;
      transition:
        border-color 400ms var(--ease),
        box-shadow 450ms var(--ease);
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.35),
        0 8px 24px rgba(0, 0, 0, 0.28);
      will-change: transform;
    }

    /* Cursor-tracked shine inside card */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        circle 240px at var(--mx, 50%) var(--my, 50%),
        rgb(var(--fg-rgb) / 0.07),
        transparent 55%
      );
      opacity: 0;
      transition: opacity 500ms var(--ease);
      z-index: 1;
    }

    /* Ember glow at card base — intensifies on hover */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse 90% 60% at 50% 130%,
        rgb(var(--accent-rgb) / 0.28),
        transparent 55%
      );
      opacity: 0;
      transition: opacity 500ms var(--ease);
      z-index: 0;
    }

    .card:hover,
    .card:focus-visible {
      border-color: rgb(var(--accent-rgb) / 0.35);
      box-shadow:
        0 2px 6px rgba(0, 0, 0, 0.45),
        0 20px 56px rgb(var(--accent-rgb) / 0.18),
        0 0 0 1px rgb(var(--accent-rgb) / 0.08);
    }

    .card:hover::before,
    .card:focus-visible::before { opacity: 1; }
    .card:hover::after,
    .card:focus-visible::after  { opacity: 1; }

    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    /* ——— Preserve-3d depth layers inside each card ——— */
    .flag {
      position: relative;
      z-index: 2;
      display: inline-block;
      font-size: 1.875rem;
      line-height: 1;
      filter: saturate(0.72) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
      transform: translateZ(40px);
      transition: filter 400ms var(--ease), transform 600ms var(--ease);
      font-family:
        "Apple Color Emoji",
        "Segoe UI Emoji",
        "Noto Color Emoji",
        "Twemoji Mozilla",
        sans-serif;
    }

    .card:hover .flag,
    .card:focus-visible .flag {
      filter: saturate(1) drop-shadow(0 4px 14px rgba(0, 0, 0, 0.6));
    }

    .content {
      position: absolute;
      left: 1.5rem;
      right: 1.5rem;
      bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      transform: translateZ(20px);
      z-index: 2;
    }

    .name {
      font-family: var(--font-sans);
      font-size: 1.375rem;
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--fg);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 1rem;
    }

    .code {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1;
    }

    .arrow {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--accent);
      line-height: 1;
      opacity: 0;
      transform: translate(-5px, 5px);
      transition:
        opacity 350ms var(--ease),
        transform 400ms var(--ease);
    }

    .card:hover .arrow,
    .card:focus-visible .arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    /* ——— Responsive ——— */
    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    }

    @media (max-width: 520px) {
      body { padding: 3rem 1.125rem; }
      header { margin-bottom: 3.5rem; }
      .card { min-height: 11rem; padding: 1.25rem; }
      .content { left: 1.25rem; right: 1.25rem; bottom: 1.25rem; }
      .name { font-size: 1.2rem; }
      .flag { font-size: 1.625rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.001ms !important;
      }
      .card { transform: none !important; }
      #embers, .ambient { display: none !important; }
      .grid > li { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="embers" aria-hidden="true"></canvas>
  <div class="ambient" aria-hidden="true"></div>

  <main>

      </li>
      <li style="--i:7">
        <a class="card" href="https://kbdfans.com/products/centinela-extension-kit" target="_blank" rel="noopener noreferrer">
          <span class="flag" aria-hidden="true">🇨🇳</span>
          <div class="content">
            <span class="name">KBDFans</span>

          </div>
        </a>
      </li>
    </ul>
  </main>

  <script>
    (function () {
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) return;

      /* ———————————————————————————————————————
         EMBER PARTICLE SYSTEM
         GPU-composited canvas, additive blending,
         sprite-cached for per-frame performance.
         ——————————————————————————————————————— */
      var canvas = document.getElementById('embers');
      var ctx = canvas.getContext('2d');
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var W = 0, H = 0;

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width  = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      // Pre-rendered sprite factory — four ceremonial hues
      var S = 48;
      function makeSprite(stops) {
        var c = document.createElement('canvas');
        c.width = c.height = S;
        var x = c.getContext('2d');
        var g = x.createRadialGradient(S/2, S/2, 0, S/2, S/2, S/2);
        for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
        x.fillStyle = g;
        x.beginPath();
        x.arc(S/2, S/2, S/2, 0, Math.PI * 2);
        x.fill();
        return c;
      }

      // Weighted palette: amber dominates, bone + violet + crimson accent
      var palette = [
        { weight: 45, sprite: makeSprite([
            [0.00, 'rgba(255, 220, 160, 0.95)'],
            [0.18, 'rgba(240, 165,  90, 0.70)'],
            [0.45, 'rgba(196, 110,  50, 0.30)'],
            [1.00, 'rgba(196, 122,  63, 0)']
          ]) },
        { weight: 22, sprite: makeSprite([
            [0.00, 'rgba(255, 245, 220, 0.90)'],
            [0.20, 'rgba(230, 215, 175, 0.55)'],
            [0.50, 'rgba(190, 175, 140, 0.20)'],
            [1.00, 'rgba(190, 175, 140, 0)']
          ]) },
        { weight: 18, sprite: makeSprite([
            [0.00, 'rgba(230, 195, 255, 0.92)'],
            [0.20, 'rgba(175, 120, 230, 0.60)'],
            [0.50, 'rgba(110,  65, 170, 0.22)'],
            [1.00, 'rgba(110,  65, 170, 0)']
          ]) },
        { weight: 15, sprite: makeSprite([
            [0.00, 'rgba(255, 185, 150, 0.92)'],
            [0.20, 'rgba(235, 105,  85, 0.58)'],
            [0.50, 'rgba(155,  45,  45, 0.26)'],
            [1.00, 'rgba(155,  45,  45, 0)']
          ]) }
      ];

      var paletteTotal = palette.reduce(function (a, p) { return a + p.weight; }, 0);
      function pickSprite() {
        var r = Math.random() * paletteTotal;
        for (var i = 0; i < palette.length; i++) {
          r -= palette[i].weight;
          if (r <= 0) return palette[i].sprite;
        }
        return palette[0].sprite;
      }

      var MAX = 55;
      var particles = [];

      function spawn() {
        particles.push({
          x: Math.random() * W,
          y: H + Math.random() * 40,
          vx: (Math.random() - 0.5) * 0.35,
          vy: -(Math.random() * 0.75 + 0.25),
          size: Math.random() * 3 + 1.4,
          life: Math.random() * 380 + 260,
          age: 0,
          drift: Math.random() * Math.PI * 2,
          sprite: pickSprite(),
        });
      }

      var last = performance.now();
      var rafId = null;
      var running = true;

      function tick(now) {
        var dt = Math.min(33, now - last);
        last = now;
        ctx.clearRect(0, 0, W, H);

        while (particles.length < MAX && Math.random() < 0.55) spawn();

        ctx.globalCompositeOperation = 'lighter';
        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.age += dt * 0.06;
          p.drift += 0.012;
          p.x += p.vx + Math.sin(p.drift) * 0.25;
          p.y += p.vy;
          p.vy -= 0.0015;

          var t = p.age / p.life;
          if (t >= 1 || p.y < -40) { particles.splice(i, 1); continue; }

          var alpha = Math.sin(t * Math.PI) * 0.72;
          var size = p.size * 4;
          ctx.globalAlpha = alpha;
          ctx.drawImage(p.sprite, p.x - size/2, p.y - size/2, size, size);
        }
        ctx.globalAlpha = 1;

        if (running) rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);

      // Pause when tab hidden — saves battery
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          running = false;
          if (rafId) cancelAnimationFrame(rafId);
        } else {
          running = true;
          last = performance.now();
          rafId = requestAnimationFrame(tick);
        }
      });

      /* ———————————————————————————————————————
         GLOBAL CURSOR TRACKING
         Drives the ambient radial glow.
         rAF-throttled to avoid style thrash.
         ——————————————————————————————————————— */
      var bodyEl = document.body;
      var cx = 0.5, cy = 0.5;
      var pendingCursor = false;

      window.addEventListener('pointermove', function (e) {
        cx = e.clientX;
        cy = e.clientY;
        if (!pendingCursor) {
          pendingCursor = true;
          requestAnimationFrame(function () {
            pendingCursor = false;
            bodyEl.style.setProperty('--cx', cx + 'px');
            bodyEl.style.setProperty('--cy', cy + 'px');
            if (!bodyEl.classList.contains('has-cursor')) {
              bodyEl.classList.add('has-cursor');
            }
          });
        }
      }, { passive: true });

      /* ———————————————————————————————————————
         3D CARD TILT + CURSOR SHINE
         rAF-lerped for smoothness. Per-card state
         in WeakMap. CSS properties feed transforms.
         ——————————————————————————————————————— */
      var cards = document.querySelectorAll('.card');
      var state = new WeakMap();

      cards.forEach(function (card) {
        state.set(card, { rx: 0, ry: 0, trx: 0, try_: 0, mx: 50, my: 50, active: false });

        card.addEventListener('pointermove', function (e) {
          var r = card.getBoundingClientRect();
          var px = (e.clientX - r.left) / r.width;
          var py = (e.clientY - r.top) / r.height;
          var s = state.get(card);
          s.try_ = (px - 0.5) * 14;
          s.trx  = (py - 0.5) * -10;
          s.mx   = px * 100;
          s.my   = py * 100;
          s.active = true;
          card.style.setProperty('--mx', s.mx + '%');
          card.style.setProperty('--my', s.my + '%');
        });

        card.addEventListener('pointerleave', function () {
          var s = state.get(card);
          s.trx = 0;
          s.try_ = 0;
          s.active = false;
        });
      });

      function lerpTilt() {
        cards.forEach(function (card) {
          var s = state.get(card);
          s.rx += (s.trx - s.rx) * 0.12;
          s.ry += (s.try_ - s.ry) * 0.12;
          if (Math.abs(s.rx) > 0.01 || Math.abs(s.ry) > 0.01 || s.active) {
            card.style.setProperty('--rx', s.rx.toFixed(2) + 'deg');
            card.style.setProperty('--ry', s.ry.toFixed(2) + 'deg');
          }
        });
        requestAnimationFrame(lerpTilt);
      }
      requestAnimationFrame(lerpTilt);
    })();
  </script>
</body>
</html>
